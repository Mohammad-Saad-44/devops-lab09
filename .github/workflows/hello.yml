name: Hello World Pipeline

on:
  push:
    branches: [ main ]

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Print Hello World
        run: echo Hello from GitHub Actions

      - name: Show User
        run: whoami

      - name: Show Directory
        run: pwd

      - name: List Files
        run: ls -la